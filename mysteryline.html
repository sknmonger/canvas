<!DOCTYPE html>
<html>
<body>

<canvas id="mysteryline" width="150" height="150" style="border:2px solid #d3d3d3; background-color:black; ">
Your browser does not support the HTML canvas tag.</canvas>

<script>
var c = document.getElementById("mysteryline");
var ctx = c.getContext("2d");

// Create a neon glow effect
ctx.shadowBlur = 1;
ctx.shadowColor = "orange";
ctx.strokeStyle = "red";
ctx.lineWidth = 1;
ctx.lineCap = "round";
ctx.fillStyle = "white"; // The color of the text itself
ctx.font = "12px Arial"; // Set the size and font face

const lines = [

[109, 97, 114, 99], [97, 116, 101, 99], [104, 32, 100, 101], [118,0,0,0]

];

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    lines.forEach(([x1, y1, x2, y2]) => {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        // position of txt
        ctx.fillText("Line Map", 2, 10);
    });
}
draw();



</script>

</body>
</html>
